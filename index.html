
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn" title="테마 변경">☀️</button>
        </div>
        <h1>로또 번호 생성기</h1>
        <div class="lotto-numbers">
            <div class="number-placeholder"></div>
            <div class="number-placeholder"></div>
            <div class="number-placeholder"></div>
            <div class="number-placeholder"></div>
            <div class="number-placeholder"></div>
            <div class="number-placeholder"></div>
        </div>
        <div class="bonus-number-container">
            <p class="bonus-title">보너스</p>
            <div class="number-placeholder bonus-number-placeholder" id="bonus-placeholder"></div>
        </div>
        <div class="options">
            <input type="checkbox" id="bonus-checkbox">
            <label for="bonus-checkbox">보너스 번호 포함</label>
        </div>
        <button id="generator-btn">번호 생성</button>
    </div>
    <script src="main.v2.js"></script>
</body>
</html>
