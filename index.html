
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn" title="테마 변경">☀️</button>
        </div>
        <h1>로또 번호 생성기</h1>
        
        <div id="lotto-results-container">
            <!-- 5개의 번호 세트가 여기에 생성됩니다 -->
        </div>

        <div class="options">
            <input type="checkbox" id="bonus-checkbox">
            <label for="bonus-checkbox">보너스 번호 포함</label>
        </div>
        <button id="generator-btn">5개 세트 생성</button>

        <hr class="divider">

        <section class="contact-section">
            <h3>🤝 제휴 및 서비스 문의</h3>
            <form action="https://formspree.io/f/xpqyjrvn" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해 주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>

        <hr class="divider">

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://sample-lotto-builder.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.v2.js"></script>
</body>
</html>
