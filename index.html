
<!DOCTYPE html>

    <title>로또 번호 생성기</title>

</head>
<body>

            <button id="theme-btn" title="테마 변경">☀️</button>

        </div>
        <button id="generator-btn">5개 세트 생성</button>
    </div>
    <script src="main.v2.js"></script>
